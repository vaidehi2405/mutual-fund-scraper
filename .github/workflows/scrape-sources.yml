name: Scrape MF Sources and Build Vector Store

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraping Pipeline
        run: |
          python app/scrape_sources.py
          python app/extract_key_facts.py
          python app/build_faq_dataset.py

      - name: Run Embedding and Vector Store Build
        run: |
          python app/embed_chunks.py
          python app/build_vector_store.py --reset

      - name: Commit and Push Data Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Commit only if there are changes
          git diff --staged --quiet || git commit -m "Auto-update MF data & vector store via GitHub Actions [skip ci]"
          git push origin HEAD:${{ github.ref }}

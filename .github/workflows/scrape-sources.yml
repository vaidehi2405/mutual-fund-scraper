name: Scrape MF Sources

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run clean scraper
        run: python clean_and_scrape.py

      - name: Upload scrape artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mf-scrape-${{ github.run_id }}
          path: |
            data/processed
            data/raw
        with:
          name: mf-scrape-${{ github.run_id }}
          path: |
           data/processed
           data/raw
